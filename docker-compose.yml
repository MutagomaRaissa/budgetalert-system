name: budgetwatch-system

services:
  # Consul Service Discovery
  # Network: main-network (for inter-service communication)
  consul:
    image: hashicorp/consul:1.19
    ports:
      - "8500:8500"
    command: consul agent -dev -client=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8500/v1/status/leader || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - main-network

  # RabbitMQ Message Broker
  # Network: main-network (for inter-service asynchronous communication)
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 8
    restart: unless-stopped
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - main-network

  # Project Database
  # Network: project-network (private, only for project-service)
  # NOT exposed externally (no public ports)
  project-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: project_db
      POSTGRES_USER: project_user
      POSTGRES_PASSWORD: project_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - project_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project_user -d project_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - project-network

  # Coverage Database
  # Network: coverage-network (private, only for coverage-service)
  # NOT exposed externally (no public ports)
  coverage-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: coverage_db
      POSTGRES_USER: coverage_user
      POSTGRES_PASSWORD: coverage_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - coverage_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coverage_user -d coverage_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - coverage-network

  # Alert Database
  # Network: alert-network (private, only for alert-service)
  # NOT exposed externally (no public ports)
  alert-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: alert_db
      POSTGRES_USER: alert_user
      POSTGRES_PASSWORD: alert_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - alert_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alert_user -d alert_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - alert-network

  # Project Service
  # Networks: project-network (for DB) + main-network (for Consul/Gateway)
  project-service:
    build:
      context: ./project-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CLOUD_CONSUL_DISCOVERY_PREFER_IP_ADDRESS: "false"
      SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME: project-service
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      SPRING_DATASOURCE_URL: jdbc:postgresql://project-db:5432/project_db
      SPRING_DATASOURCE_USERNAME: project_user
      SPRING_DATASOURCE_PASSWORD: project_password
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      SERVER_PORT: 8081
      SPRINGDOC_SERVER_URL: ${PUBLIC_BASE_URL:-http://localhost:5173/group-9}
    ports:
      - "8081:8081"
    depends_on:
      consul:
        condition: service_healthy
      project-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - project-network
      - main-network

  # Coverage Service
  # Networks: coverage-network (for DB) + main-network (for Consul/Gateway)
  coverage-service:
    build:
      context: ./coverage-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CLOUD_CONSUL_DISCOVERY_PREFER_IP_ADDRESS: "false"
      SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME: coverage-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://coverage-db:5432/coverage_db
      SPRING_DATASOURCE_USERNAME: coverage_user
      SPRING_DATASOURCE_PASSWORD: coverage_password
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin
      SERVER_PORT: 8082
      SPRINGDOC_SERVER_URL: ${PUBLIC_BASE_URL:-http://localhost:5173/group-9}
    ports:
      - "8082:8082"
    depends_on:
      consul:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      coverage-db:
        condition: service_healthy
      project-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - coverage-network
      - main-network

  # Alert Service
  # Networks: alert-network (for DB) + main-network (for Consul/Gateway)
  alert-service:
    build:
      context: ./alert-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CLOUD_CONSUL_DISCOVERY_PREFER_IP_ADDRESS: "false"
      SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME: alert-service
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      SPRING_DATASOURCE_URL: jdbc:postgresql://alert-db:5432/alert_db
      SPRING_DATASOURCE_USERNAME: alert_user
      SPRING_DATASOURCE_PASSWORD: alert_password
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin
      SERVER_PORT: 8083
      SPRINGDOC_SERVER_URL: ${PUBLIC_BASE_URL:-http://localhost:5173/group-9}
    ports:
      - "8083:8083"
    depends_on:
      consul:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      alert-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - alert-network
      - main-network

  # API Gateway
  # Network: main-network (for communication with all services)
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CLOUD_CONSUL_DISCOVERY_PREFER_IP_ADDRESS: "false"
      SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME: api-gateway
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      SERVER_PORT: 8080
      SWAGGER_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:5173/group-9}
    ports:
      - "8080:8080"
    depends_on:
      consul:
        condition: service_healthy
      project-service:
        condition: service_healthy
      coverage-service:
        condition: service_started
      alert-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - main-network

  # Dashboard UI
  # Network: main-network (served locally at /group-9 to match the future deployment path)
  dashboard-ui:
    build:
      context: ./dashboard-ui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_PATH: /group-9
        VITE_BASE_PATH: /group-9/
    ports:
      - "5173:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - main-network

volumes:
  rabbitmq_data:
    name: budgetwatch-system_rabbitmq_data
  project_db_data:
    name: budgetwatch-system_project_db_data
  coverage_db_data:
    name: budgetwatch-system_coverage_db_data
  alert_db_data:
    name: budgetwatch-system_alert_db_data

networks:
  # Main network for inter-service communication (Consul, Gateway, Microservices, UI)
  main-network:
    driver: bridge
    name: budgetwatch-main

  # Private network for Project Service and its database
  project-network:
    driver: bridge
    name: budgetwatch-project-db

  # Private network for Coverage Service and its database
  coverage-network:
    driver: bridge
    name: budgetwatch-coverage-db

  # Private network for Alert Service and its database
  alert-network:
    driver: bridge
    name: budgetwatch-alert-db
