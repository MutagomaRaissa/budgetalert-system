apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dashboard-httproute
  namespace: group-9
  labels:
    app.kubernetes.io/name: dashboard-ui
    app.kubernetes.io/instance: group-9
    app.kubernetes.io/part-of: budgetwatch
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: shared-gateway
      namespace: default
      sectionName: https
  rules:
    - matches:
        - path:
            type: Exact
            value: /group-9
        - path:
            type: Exact
            value: /group-9/
        - path:
            type: PathPrefix
            value: /group-9/assets
      backendRefs:
        - group: ""
          kind: Service
          name: dashboard-ui
          port: 80
          weight: 1
