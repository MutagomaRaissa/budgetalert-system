apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: group-9-https-route
  namespace: group-9
  labels:
    app.kubernetes.io/name: budgetwatch-routing
    app.kubernetes.io/instance: group-9
    app.kubernetes.io/part-of: budgetwatch
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: shared-gateway
      namespace: default
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /group-9/api
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api
      backendRefs:
        - group: ""
          kind: Service
          name: api-gateway
          port: 8080
          weight: 1
