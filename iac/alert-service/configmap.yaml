apiVersion: v1
kind: ConfigMap
metadata:
  name: alert-service-config
  namespace: group-9
  labels:
    app.kubernetes.io/name: alert-service
    app.kubernetes.io/instance: group-9
    app.kubernetes.io/part-of: budgetwatch
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://alert-db:5432/alert_db"
  SPRING_DATASOURCE_USERNAME: "alert_user"
  CONSUL_HOST: "consul"
  CONSUL_PORT: "8500"
  SPRING_CLOUD_CONSUL_DISCOVERY_PREFER_IP_ADDRESS: "false"
  SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME: "alert-service"
  SPRING_RABBITMQ_HOST: "rabbitmq"
  SPRING_RABBITMQ_PORT: "5672"
  SPRING_RABBITMQ_USERNAME: "admin"
  SERVER_PORT: "8083"
  SPRINGDOC_SERVER_URL: "https://130.192.100.243/group-9"
