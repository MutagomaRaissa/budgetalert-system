spring:
  application:
    name: api-gateway
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        service-name: ${spring.application.name}
        health-check-path: /actuator/health
        health-check-interval: 10s
        enabled: true
        prefer-ip-address: true
    gateway:
      routes:
        - id: auth-service
          uri: lb://project-service
          predicates:
            - Path=/api/v1/auth/**
        - id: project-service
          uri: lb://project-service
          predicates:
            - Path=/api/v1/projects/**
        - id: coverage-service
          uri: lb://coverage-service
          predicates:
            - Path=/api/v1/coverage/**
        - id: alert-service
          uri: lb://alert-service
          predicates:
            - Path=/api/v1/alerts/**
        - id: swagger-project
          uri: lb://project-service
          predicates:
            - Path=/swagger/project/**
          filters:
            - RewritePath=/swagger/project/(?<segment>.*), /$\{segment}
            - name: OpenApiResponseModify
              args:
                baseUrl: ${SWAGGER_BASE_URL:http://localhost:8080}
        - id: swagger-coverage
          uri: lb://coverage-service
          predicates:
            - Path=/swagger/coverage/**
          filters:
            - RewritePath=/swagger/coverage/(?<segment>.*), /$\{segment}
            - name: OpenApiResponseModify
              args:
                baseUrl: ${SWAGGER_BASE_URL:http://localhost:8080}
        - id: swagger-alert
          uri: lb://alert-service
          predicates:
            - Path=/swagger/alert/**
          filters:
            - RewritePath=/swagger/alert/(?<segment>.*), /$\{segment}
            - name: OpenApiResponseModify
              args:
                baseUrl: ${SWAGGER_BASE_URL:http://localhost:8080}
server:
  port: ${SERVER_PORT:8080}
springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: false
management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
