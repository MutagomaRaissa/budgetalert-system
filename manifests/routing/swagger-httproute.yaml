apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: swagger-httproute
  namespace: group-9
  labels:
    app.kubernetes.io/name: swagger
    app.kubernetes.io/instance: group-9
    app.kubernetes.io/part-of: budgetwatch
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: shared-gateway
      namespace: default
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /group-9/swagger
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /swagger
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Host
                value: 130.192.100.243/group-9
              - name: X-Forwarded-Proto
                value: https
              - name: X-Forwarded-Prefix
                value: /group-9
      backendRefs:
        - group: ""
          kind: Service
          name: api-gateway
          port: 8080
          weight: 1
