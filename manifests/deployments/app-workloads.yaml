apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-service
  namespace: group-9
  labels:
    app.kubernetes.io/name: project-service
    app.kubernetes.io/instance: group-9
    app.kubernetes.io/part-of: budgetwatch
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: project-service
      app.kubernetes.io/name: project-service
      app.kubernetes.io/instance: group-9
  template:
    metadata:
      labels:
        app: project-service
        app.kubernetes.io/name: project-service
        app.kubernetes.io/instance: group-9
    spec:
      containers:
        - name: project-service
          image: docker.io/rmutagoma/budgetwatch-project-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: project-service-config
            - secretRef:
                name: project-service-secret
            - secretRef:
                name: jwt-secret
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              memory: "768Mi"
              cpu: "300m"
            limits:
              memory: "1536Mi"
              cpu: "750m"
---
