apiVersion: apps/v1
kind: Deployment
metadata:
  name: consul
  namespace: group-9
  labels:
    app.kubernetes.io/name: consul
    app.kubernetes.io/instance: group-9
    app.kubernetes.io/part-of: budgetwatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consul
      app.kubernetes.io/name: consul
      app.kubernetes.io/instance: group-9
  template:
    metadata:
      labels:
        app: consul
        app.kubernetes.io/name: consul
        app.kubernetes.io/instance: group-9
    spec:
      containers:
        - name: consul
          image: hashicorp/consul:1.19
          imagePullPolicy: IfNotPresent
          command: ["consul", "agent", "-dev", "-client=0.0.0.0"]
          ports:
            - containerPort: 8500
              name: http
          envFrom:
            - configMapRef:
                name: consul-config
          readinessProbe:
            httpGet:
              path: /v1/status/leader
              port: 8500
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/status/leader
              port: 8500
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: group-9
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/instance: group-9
    app.kubernetes.io/part-of: budgetwatch
spec:
  serviceName: rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
      app.kubernetes.io/name: rabbitmq
      app.kubernetes.io/instance: group-9
  template:
    metadata:
      labels:
        app: rabbitmq
        app.kubernetes.io/name: rabbitmq
        app.kubernetes.io/instance: group-9
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.12-management-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          envFrom:
            - configMapRef:
                name: rabbitmq-config
            - secretRef:
                name: rabbitmq-secret
          startupProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        storageClassName: csi-cinder-fast
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-ui
  namespace: group-9
  labels:
    app.kubernetes.io/name: dashboard-ui
    app.kubernetes.io/instance: group-9
    app.kubernetes.io/part-of: budgetwatch
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard-ui
      app.kubernetes.io/name: dashboard-ui
      app.kubernetes.io/instance: group-9
  template:
    metadata:
      labels:
        app: dashboard-ui
        app.kubernetes.io/name: dashboard-ui
        app.kubernetes.io/instance: group-9
    spec:
      containers:
        - name: dashboard-ui
          image: docker.io/rmutagoma/budgetwatch-dashboard-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
