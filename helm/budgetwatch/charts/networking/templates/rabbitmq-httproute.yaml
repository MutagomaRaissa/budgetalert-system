{{- if .Values.routes.rabbitmq.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.routes.rabbitmq.name }}
  namespace: {{ include "networking.namespace" . }}
  labels:
    helm.sh/chart: {{ include "networking.chart" . }}
    app.kubernetes.io/name: {{ .Values.routes.rabbitmq.labelName }}
    app.kubernetes.io/instance: {{ include "networking.instance" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: {{ .Values.partOf }}
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  rules:
    {{- toYaml .Values.routes.rabbitmq.rules | nindent 4 }}
{{- end }}
