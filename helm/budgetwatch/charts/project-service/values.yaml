enabled: true
nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""
instanceOverride: ""
partOf: budgetwatch
imagePullSecrets: []
podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}

replicaCount: 2
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 1

image:
  repository: docker.io/rmutagoma/budgetwatch-project-service
  tag: latest
  pullPolicy: Always

container:
  name: project-service
  ports:
    - name: http
      containerPort: 8081

service:
  name: project-service
  type: ClusterIP
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      protocol: TCP

configMap:
  enabled: true
  name: project-service-config
  data:
    SPRING_PROFILES_ACTIVE: prod
    SPRING_DATASOURCE_URL: jdbc:postgresql://project-db:5432/project_db
    SPRING_DATASOURCE_USERNAME: project_user
    CONSUL_HOST: consul
    CONSUL_PORT: "8500"
    SPRING_CLOUD_CONSUL_DISCOVERY_PREFER_IP_ADDRESS: "false"
    SPRING_CLOUD_CONSUL_DISCOVERY_HOSTNAME: project-service
    SERVER_PORT: "8081"
    SPRINGDOC_SERVER_URL: https://130.192.100.243/group-9

secret:
  enabled: true
  name: project-service-secret
  type: Opaque
  stringData:
    SPRING_DATASOURCE_PASSWORD: password

jwtSecret:
  enabled: true
  name: jwt-secret
  type: Opaque
  stringData:
    APP_JWT_SECRET: budgetwatch-group9-jwt-secret-password-2026

env:
  - name: SPRING_CLOUD_CONSUL_DISCOVERY_INSTANCE_ID
    valueFrom:
      fieldRef:
        fieldPath: metadata.name

envFrom:
  configMaps:
    - project-service-config
  secrets:
    - project-service-secret
    - jwt-secret

startupProbe:
  httpGet:
    path: /actuator/health
    port: 8081
  initialDelaySeconds: 45
  periodSeconds: 10
  timeoutSeconds: 10
  failureThreshold: 30

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8081
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 10

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8081
  initialDelaySeconds: 90
  periodSeconds: 30
  timeoutSeconds: 10

resources:
  requests:
    memory: 768Mi
    cpu: 300m
  limits:
    memory: 1536Mi
    cpu: 750m
